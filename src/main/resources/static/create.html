<!DOCTYPE html>

<html>

<head>
    <title>Create Project / Issue</title>
    <link rel="stylesheet" href="/css/create.css">
</head>

<body>

    <div class="navbar">
        <h2 class="logo">MiniJira</h2>
        <div class="nav-links">
            <a href="/front.html">Home</a>
            <a href="/dashboard.html">Dashboard</a>
            <a href="/create.html">Raise Project</a>
            <a href="/board.html">Status</a>
            <a href="/analytics.html">Analytics</a>
            <span id="username"></span>
            <a href="/index.html">Logout</a>
        </div>
    </div>

    <!-- CREATE PROJECT -->

    <section class="create-section">

        <h2>Create Project</h2>

        <form id="projectForm">

            <input type="text" id="name" placeholder="Project Name" required>

            <input type="text" id="projectLead" placeholder="Project Lead" required>

            <div id="teamContainer">
                <div class="member">
                    <input type="text" placeholder="Username" class="m_username">
                    <input type="email" placeholder="Email" class="m_email">
                    <select class="m_role">
                        <option>Developer</option>
                        <option>Tester</option>
                        <option>Manager</option>
                    </select>

                      <button type="button"
                        class="delete-btn"
                        onclick="removeMember(this)">
                        Delete
                      </button>
                </div>
            </div>

            <button type="button" onclick="addMember()">+ Add Member</button>

            <select id="status">
                <option value="TODO">TODO</option>
                <option value="IN_PROGRESS">IN_PROGRESS</option>
                <option value="Completed">Completed</option>
            </select>

            <select id="stage">
                <option value="PLANNING">Planning</option>
                <option value="DESIGN">Design</option>
                <option value="DEVELOPMENT">Development</option>
                <option value="TESTING">Testing</option>
                <option value="DEPLOYMENT">Deployment</option>
            </select>

            <textarea id="description" placeholder="Project Description"></textarea>

            <button type="submit">Create Project</button>

        </form>

    </section>

    <script src="/js/createProjectNew.js"></script>


</body>

</html>
